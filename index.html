<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Гибкость Reveal.js — демо</title>
    <link rel="stylesheet" href="dist/reveal.css">
    <link rel="stylesheet" href="dist/theme/black.css">
    <link rel="stylesheet" href="dist/plugin/highlight/monokai.css">
</head>
<body>
    <div class="reveal">
        <div class="slides">
                     
			<section data-background="original.jpg" data-background-size="cover">
    			<p style="color: white; background: rgba(0,0,0,0.5); display: inline-block; padding: 10px;">
        			картинка на фоне
    			</p>
			</section>
    
        </div>
    </div>

    <script src="dist/reveal.js"></script>
    <script src="dist/plugin/notes.js"></script>
    <script src="dist/plugin/markdown.js"></script>
    <script src="dist/plugin/highlight.js"></script>
    <script>
        Reveal.initialize({
            hash: true,
            slideNumber: true,
            transitionSpeed: 'default',
            backgroundTransition: 'fade',
            plugins: [ RevealMarkdown, RevealHighlight, RevealNotes ]
        });
    </script>
</body>
</html>
